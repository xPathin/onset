name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "data/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "aur/**"
      - ".github/workflows/**"

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libadwaita-1-dev
      - run: cargo test
