name: Release

on:
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get install -y libgtk-4-dev libadwaita-1-dev
      - run: cargo build --release --locked
      - name: Package
        run: |
          DIR="onset-${GITHUB_REF_NAME}-linux-${{ matrix.arch }}"
          mkdir "$DIR"
          cp target/release/onset "$DIR/"
          cp data/com.github.xPathin.onset.desktop "$DIR/"
          cp data/icons/hicolor/scalable/apps/com.github.xPathin.onset.svg "$DIR/"
          cp LICENSE "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"
      - uses: softprops/action-gh-release@v2
        with:
          files: onset-*.tar.gz

  publish-aur:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update PKGBUILD version
        run: |
          sed -i "s/pkgver=.*/pkgver=$GITHUB_REF_NAME/" aur/onset/PKGBUILD
      - uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: onset
          pkgbuild: ./aur/onset/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
