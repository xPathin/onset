name: Release

on:
  push:
    tags: ["[0-9]+.*"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches Cargo.toml
        run: |
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$CARGO_VER" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME doesn't match Cargo.toml version $CARGO_VER"
            exit 1
          fi

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get install -y libgtk-4-dev libadwaita-1-dev
      - run: cargo build --release --locked
      - name: Package
        run: |
          DIR="onset-${GITHUB_REF_NAME}-linux-${{ matrix.arch }}"
          mkdir "$DIR"
          cp target/release/onset "$DIR/"
          cp data/com.github.xPathin.onset.desktop "$DIR/"
          cp data/icons/hicolor/scalable/apps/com.github.xPathin.onset.svg "$DIR/"
          cp LICENSE "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: onset-*.tar.gz
